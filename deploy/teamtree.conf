# =============================================================================
# teamtree.conf — URL routing rules for the TeamTree app
#
# Included inside the server {} block by nginx.conf.
# Placeholders __APP_DIR__ and __API_PORT__ are substituted by deploy.sh.
# =============================================================================

# ── API reverse proxy ─────────────────────────────────────────────────────────
# Forwarded to the local Node.js server (teamtree-api systemd service).
location /api/ {
    proxy_pass         http://127.0.0.1:__API_PORT__;

    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;

    # WebSocket / SSE support
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # Reasonable timeouts for API calls
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
}

# ── Long-lived cache for Vite-hashed assets ───────────────────────────────────
location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|wasm)$ {
    root __APP_DIR__;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# ── index.html — never cached ─────────────────────────────────────────────────
location = /index.html {
    root __APP_DIR__;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# ── React SPA fallback ────────────────────────────────────────────────────────
# Unknown paths fall through to index.html so react-router works.
location / {
    root      __APP_DIR__;
    try_files $uri $uri/ /index.html;
}
