# =============================================================================
# teamtree.conf — URL routing rules for the TeamTree app
#
# Included inside the server {} block by nginx.conf.
# Placeholders __APP_DIR__ and __API_PORT__ are substituted by deploy.sh.
# The app is served at /teamtree/; the API is at /teamtree/api/.
# =============================================================================

# ── API reverse proxy ─────────────────────────────────────────────────────────
# Matches both /teamtree/api and /teamtree/api/... (exact + prefix) so the
# SPA fallback below never intercepts API calls.
# The /teamtree prefix is stripped before forwarding to the Node.js server.
location ^~ /teamtree/api {
    rewrite ^/teamtree(/api.*)$ $1 break;
    proxy_pass         http://127.0.0.1:__API_PORT__;

    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;

    # WebSocket / SSE support
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # Reasonable timeouts for API calls
    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
}

# ── Redirect /teamtree → /teamtree/ ──────────────────────────────────────────
location = /teamtree {
    return 301 /teamtree/;
}

# ── Long-lived cache for Vite-hashed assets ───────────────────────────────────
# Captures the path after /teamtree/ and maps it directly to __APP_DIR__.
location ~* ^/teamtree/(.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|wasm))$ {
    alias __APP_DIR__/$1;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ── index.html — never cached ─────────────────────────────────────────────────
location = /teamtree/index.html {
    alias __APP_DIR__/index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# ── React SPA fallback ────────────────────────────────────────────────────────
# Unknown paths under /teamtree/* fall through to index.html so
# react-router (basename="/teamtree") handles client-side routing.
# The fallback uses a named location (@spa) so try_files never triggers
# a URI-based internal redirect that could re-enter this block.
location /teamtree/ {
    alias     __APP_DIR__/;
    index     index.html;
    try_files $uri @spa;
}

location @spa {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    root      __APP_DIR__;
    try_files /index.html =404;
}
